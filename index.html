<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>47rave Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-800">

  <header class="p-6 shadow-md flex justify-between items-center">
    <h1 class="text-2xl font-bold">47rave</h1>
    <a href="https://instagram.com/47rave.s" target="_blank" class="text-pink-500 font-semibold">Instagram</a>
  </header>

  <section class="text-center py-16 px-6">
    <h2 class="text-4xl font-bold mb-4">Tu estilo, tu vibra</h2>
    <p class="text-gray-600 mb-6">Accesorios únicos que marcan tendencia</p>
    <a href="#productos" class="bg-black text-white px-6 py-3 rounded-full">Ver productos</a>
  </section>

  <section id="productos" class="px-6 py-10">
    <h3 class="text-2xl font-semibold mb-6">Productos</h3>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <div class="border rounded-2xl p-4 shadow">
        <img src="https://via.placeholder.com/300" class="rounded-xl mb-4">
        <h4 class="font-semibold">Lentes Carey</h4>
        <p class="text-gray-500">$10.000</p>
        <a href="https://wa.me/" class="mt-3 block bg-black text-white px-4 py-2 rounded-full text-center">Comprar</a>
      </div>

      <div class="border rounded-2xl p-4 shadow">
        <img src="https://via.placeholder.com/300" class="rounded-xl mb-4">
        <h4 class="font-semibold">Lentes Negros</h4>
        <p class="text-gray-500">$12.000</p>
        <a href="https://wa.me/" class="mt-3 block bg-black text-white px-4 py-2 rounded-full text-center">Comprar</a>
      </div>

      <div class="border rounded-2xl p-4 shadow">
        <img src="https://via.placeholder.com/300" class="rounded-xl mb-4">
        <h4 class="font-semibold">Modelo Premium</h4>
        <p class="text-gray-500">$15.000</p>
        <a href="https://wa.me/" class="mt-3 block bg-black text-white px-4 py-2 rounded-full text-center">Comprar</a>
      </div>

    </div>
  </section>

  <section class="bg-gray-100 py-10 px-6 text-center">
    <h3 class="text-xl font-semibold mb-4">Comprá directo</h3>
    <a href="https://instagram.com/47rave.s" target="_blank" class="bg-pink-500 text-white px-6 py-2 rounded-full">Ir a Instagram</a>
  </section>

  <footer class="text-center py-6 text-gray-500">
    © 2026 47rave
  </footer>

</body>
</html>
